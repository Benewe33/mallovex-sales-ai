<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MALLOVEX AI">
<meta name="theme-color" content="#0B1C3D">
<title>MALLOVEX · Sales Booster AI</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230B1C3D'/%3E%3Ctext x='90' y='72' font-family='Arial Black' font-size='40' font-weight='900' fill='%23F8F9FC' text-anchor='middle'%3EMALLO%3C/text%3E%3Ctext x='90' y='120' font-family='Arial Black' font-size='40' font-weight='900' fill='%23F5620F' text-anchor='middle'%3EVEX%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0B1C3D;--navy-mid:#0E2249;--navy-light:#162D57;
  --orange:#F5620F;--orange-lite:#FF7A2B;
  --orange-glow:rgba(245,98,15,0.14);--orange-bdr:rgba(245,98,15,0.35);
  --white:#F8F9FC;--gray:#8899B4;--gray-lite:#C5CFE0;
  --card:rgba(255,255,255,0.045);--card2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);--success:#2ECC71;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,20px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:-webkit-fill-available;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--navy);color:var(--white);height:100vh;height:-webkit-fill-available;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overscroll-behavior:none;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(245,98,15,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,98,15,0.03) 1px,transparent 1px);background-size:44px 44px;}
.bg-orb{position:fixed;top:-180px;right:-150px;z-index:0;pointer-events:none;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,98,15,0.12) 0%,transparent 68%);animation:orbF 9s ease-in-out infinite;}
.bg-orb2{position:fixed;bottom:-200px;left:-100px;z-index:0;pointer-events:none;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(11,60,140,0.25) 0%,transparent 68%);animation:orbF 13s ease-in-out infinite reverse;}
@keyframes orbF{0%,100%{transform:translateY(0)}50%{transform:translateY(28px)}}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;padding-top:var(--sat);}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);background:rgba(11,28,61,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;position:relative;z-index:50;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:2.5px;}
.logo em{color:var(--orange);font-style:normal;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
.badge{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--orange-lite);background:var(--orange-glow);border:1px solid var(--orange-bdr);padding:3px 9px;border-radius:20px;}
.menubtn{background:var(--card);border:1px solid var(--border);color:var(--gray-lite);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;-webkit-user-select:none;user-select:none;transition:all 0.15s;}
.menubtn:active{background:var(--card2);transform:scale(0.93);}
.modebar{display:flex;gap:7px;overflow-x:auto;padding:10px 18px;border-bottom:1px solid var(--border);background:rgba(11,28,61,0.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.modebar::-webkit-scrollbar{display:none;}
.mpill{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:22px;white-space:nowrap;border:1px solid var(--border);background:var(--card);cursor:pointer;flex-shrink:0;transition:all 0.18s;-webkit-user-select:none;user-select:none;}
.mpill:active{transform:scale(0.94);}
.mpill.active{background:var(--orange-glow);border-color:var(--orange-bdr);}
.mpill-ico{font-size:15px;}
.mpill-lbl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.3px;color:var(--gray-lite);}
.mpill.active .mpill-lbl{color:var(--orange-lite);}
.chat{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 8px;display:flex;flex-direction:column;gap:13px;overscroll-behavior:contain;}
.chat::-webkit-scrollbar{display:none;}
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 6px 28px;gap:14px;animation:fadeUp 0.45s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.w-emoji{font-size:50px;animation:emojiB 2.8s ease-in-out infinite;}
@keyframes emojiB{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.w-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1.1;letter-spacing:0.5px;}
.w-title em{color:var(--orange);font-style:normal;}
.w-sub{font-size:13px;color:var(--gray);line-height:1.55;max-width:290px;}
.sugg{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;margin-top:4px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 11px;text-align:left;cursor:pointer;transition:all 0.18s;-webkit-user-select:none;user-select:none;}
.scard:active{background:var(--orange-glow);border-color:var(--orange-bdr);transform:scale(0.96);}
.scard-ico{font-size:21px;margin-bottom:5px;}
.scard-ttl{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px;}
.scard-sub{font-size:11px;color:var(--gray);line-height:1.35;}
.msg{display:flex;gap:9px;animation:msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(9px) scale(0.97)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}
.av{width:31px;height:31px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:0.7px;border:1px solid;}
.av.ai{background:var(--orange-glow);border-color:var(--orange-bdr);color:var(--orange);}
.av.you{background:rgba(255,255,255,0.06);border-color:var(--border);color:var(--gray-lite);}
.bub{max-width:calc(100% - 48px);padding:11px 14px;border-radius:16px;border:1px solid;font-size:14px;line-height:1.62;-webkit-user-select:text;user-select:text;}
.bub.ai{background:var(--card);border-color:var(--border);color:var(--gray-lite);border-bottom-left-radius:3px;}
.bub.user{background:rgba(245,98,15,0.11);border-color:rgba(245,98,15,0.22);color:var(--white);border-bottom-right-radius:3px;}
.bub strong{color:var(--orange-lite);font-weight:600;}
.bub h4{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--white);letter-spacing:0.3px;margin:5px 0 7px;}
.bub ul{padding-left:16px;}.bub ul li{margin-bottom:5px;}
.bub p{margin-bottom:5px;}.bub p:last-child{margin-bottom:0;}
.bub-acts{display:flex;gap:7px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.bact{font-size:11px;color:var(--gray);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none;}
.bact:active{background:var(--orange-glow);color:var(--orange-lite);border-color:var(--orange-bdr);}
.typing{display:flex;gap:5px;align-items:center;padding:3px 0;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--orange);display:block;animation:tb 1.1s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.18s;}.typing span:nth-child(3){animation-delay:.36s;}
@keyframes tb{0%,80%,100%{transform:scale(0.5);opacity:0.35}40%{transform:scale(1.1);opacity:1}}
.qbar{display:flex;gap:7px;overflow-x:auto;padding:7px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.qbar::-webkit-scrollbar{display:none;}
.qp{white-space:nowrap;flex-shrink:0;font-size:12px;color:var(--gray-lite);background:var(--card);border:1px solid var(--border);border-radius:18px;padding:6px 12px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none;}
.qp:active{background:var(--orange-glow);border-color:var(--orange-bdr);color:var(--orange-lite);transform:scale(0.95);}
.inpzone{flex-shrink:0;padding:9px 14px;padding-bottom:calc(9px + var(--sab));background:rgba(11,28,61,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);}
.inprow{display:flex;align-items:flex-end;gap:9px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:9px 13px;transition:border-color 0.2s;}
.inprow:focus-within{border-color:rgba(245,98,15,0.5);}
textarea#inp{flex:1;background:none;border:none;outline:none;color:var(--white);font-family:'DM Sans',sans-serif;font-size:16px;resize:none;line-height:1.45;max-height:108px;min-height:24px;-webkit-appearance:none;}
textarea#inp::placeholder{color:var(--gray);}
.sendbtn{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:var(--orange);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;box-shadow:0 4px 14px rgba(245,98,15,0.38);-webkit-user-select:none;user-select:none;}
.sendbtn:active{transform:scale(0.9);background:var(--orange-lite);}
.sendbtn:disabled{background:var(--navy-light);box-shadow:none;}
.sendbtn svg{width:17px;height:17px;fill:white;}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(4,10,24,0.72);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);display:none;opacity:0;transition:opacity 0.25s;align-items:flex-end;}
.overlay.open{display:flex;opacity:1;}
.sheet{width:100%;background:var(--navy-mid);border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:0 0 calc(20px + var(--sab));transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:13px auto 16px;}
.sheet-ttl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gray);text-transform:uppercase;padding:0 18px 10px;}
.sitem{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.14s;-webkit-user-select:none;user-select:none;}
.sitem:last-child{border-bottom:none;}
.sitem:active{background:var(--card2);}
.sitem.active{background:var(--orange-glow);}
.sico{font-size:23px;width:30px;text-align:center;}
.stxt{flex:1;}
.sname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--white);letter-spacing:0.3px;}
.sitem.active .sname{color:var(--orange-lite);}
.sdesc{font-size:12px;color:var(--gray);margin-top:2px;}
.schk{color:var(--orange);font-size:17px;opacity:0;}
.sitem.active .schk{opacity:1;}
.toast{position:fixed;bottom:calc(88px + var(--sab));left:50%;transform:translateX(-50%) translateY(18px);background:rgba(245,98,15,0.96);color:white;font-size:13px;font-weight:500;padding:10px 20px;border-radius:22px;opacity:0;transition:all 0.24s;z-index:300;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.instbanner{background:linear-gradient(135deg,var(--navy-light),var(--navy-mid));border:1px solid var(--orange-bdr);border-radius:14px;padding:12px 14px;margin:10px 14px 0;display:flex;align-items:center;gap:11px;animation:fadeUp 0.4s ease;flex-shrink:0;}
.ib-txt{flex:1;}
.ib-ttl{font-size:13px;font-weight:600;color:var(--white);}
.ib-sub{font-size:11px;color:var(--gray);margin-top:2px;}
.ib-cls{color:var(--gray);font-size:17px;cursor:pointer;padding:4px;-webkit-user-select:none;user-select:none;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb"></div>
<div class="bg-orb2"></div>
<div class="toast" id="toast"></div>
<div class="app">
  <div class="instbanner" id="instBanner">
    <div style="font-size:25px">📲</div>
    <div class="ib-txt">
      <div class="ib-ttl">Ajouter à l'écran d'accueil</div>
      <div class="ib-sub">Partager ↑ → Sur l'écran d'accueil → Ajouter</div>
    </div>
    <div class="ib-cls" onclick="this.closest('.instbanner').remove()">✕</div>
  </div>
  <div class="hdr">
    <div class="logo">MALLO<em>VEX</em></div>
    <div class="hdr-r">
      <div class="ldot"></div>
      <div class="badge">Sales AI</div>
      <div class="menubtn" onclick="openSheet()">☰</div>
    </div>
  </div>
  <div class="modebar" id="modebar"></div>
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="w-emoji">🚀</div>
      <div class="w-title">Boostez vos ventes<br>avec <em>l'IA MALLOVEX</em></div>
      <div class="w-sub">Assistant commercial IA multi-canal. Choisissez un mode ou démarrez avec une suggestion.</div>
      <div class="sugg" id="sugg"></div>
    </div>
  </div>
  <div class="qbar hidden" id="qbar"></div>
  <div class="inpzone">
    <div class="inprow">
      <textarea id="inp" rows="1" placeholder="Décrivez votre produit ou demande…" oninput="autoR(this)" onkeydown="hKey(event)"></textarea>
      <button class="sendbtn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<div class="overlay" id="ov" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-ttl">Choisir un mode IA</div>
    <div id="sitems"></div>
  </div>
</div>
<script>
const MODES=[
  {id:'listing',ico:'✍️',lbl:'Listing',ttl:'Copywriter Listing',sub:'Titres, descriptions & bullet points conversion',
   prompts:['Adapter pour l\'Afrique','SEO Amazon / Jumia','Version courte','3 variantes A/B'],
   sys:`Tu es expert copywriting e-commerce pour MALLOVEX, entreprise de sourcing international basée à Guangzhou. Rédige des listings produit percutants en français, optimisés pour Amazon, Jumia, Facebook Shop, site MALLOVEX. Structure: Titre principal | Sous-titre | 5 bullet points bénéfices | Description longue | Mots-clés SEO. Adapte au marché cible (Afrique, Europe, Amérique). Sois direct et percutant.`},
  {id:'tiktok',ico:'🎬',lbl:'TikTok',ttl:'Script TikTok / Vidéo',sub:'Scripts viraux pour @mallovex',
   prompts:['Version 15 secondes','Version 60 secondes','Hashtags tendance','Version Reels'],
   sys:`Tu es créateur contenu viral pour @mallovex sur TikTok. Crée scripts (15s/30s/60s): Hook 3s percutant | Narration | CTA fort | Hashtags. Style dynamique, adapté audience africaine diaspora. Inclus textes à l'écran et suggestions musicales.`},
  {id:'pricing',ico:'💰',lbl:'Prix',ttl:'Stratégie Prix',sub:'Marges, positionnement et promotions',
   prompts:['Calculer marge nette','Prix marché africain','Bundle & promos','Stratégie lancement'],
   sys:`Tu es consultant stratégie commerciale import-export Chine-Afrique-Europe pour MALLOVEX. Analyse: coûts importation, marges cibles, prix psychologiques, promotions, bundles. Conseils concrets avec chiffres et % par marché. Intègre droits douaniers, logistique, concurrence locale.`},
  {id:'ads',ico:'🎯',lbl:'Ads',ttl:'Publicité & Ads',sub:'Meta, Google, TikTok Ads haute-conversion',
   prompts:['3 accroches variantes','Ciblage audience','Version Meta Ads','Version TikTok Ads'],
   sys:`Tu es expert publicité digitale pour MALLOVEX, e-commerce international. Rédige copies haute-conversion pour Meta, Google, TikTok Ads. Par demande: 3 accroches alternatives | Corps texte | CTA | Audience cible | Format recommandé.`},
  {id:'email',ico:'📧',lbl:'Email',ttl:'Email & Follow-up',sub:'Séquences B2B et newsletters',
   prompts:['Relance client','Prospection importateur','Newsletter mensuelle','Offre B2B'],
   sys:`Tu es expert email marketing B2B pour MALLOVEX et Thiam Import & Export. Rédige emails pros fr/en: prospection, relance, offre, newsletter. Structure: Objet accrocheur | Corps persuasif | CTA clair | Signature pro. Adapte selon destinataire.`},
  {id:'market',ico:'📊',lbl:'Marché',ttl:'Analyse Marché',sub:'Tendances, niches et opportunités',
   prompts:['Top produits Afrique','Analyse concurrents','Opportunités secteur','Marché aquaculture'],
   sys:`Tu es analyste marché commerce international Chine-Afrique-Europe pour MALLOVEX. Identifie opportunités, tendances, concurrence, stratégies d'entrée. Insights: taille marché | Tendances | Prix moyens | Recommandations.`}
];
const SUGG=[
  {ico:'📦',ttl:'Listing Produit',sub:'Pompe à eau 12V → Afrique',tx:'Rédige un listing produit pour une pompe à eau submersible 12V, marché Afrique subsaharienne.'},
  {ico:'🎬',ttl:'Script TikTok',sub:'Filtres à eau 30 secondes',tx:'Crée un script TikTok viral 30 secondes pour promouvoir des filtres à eau MALLOVEX.'},
  {ico:'💰',ttl:'Stratégie Prix',sub:'Aquaculture Europe vs Afrique',tx:'Quelle stratégie de prix pour vendre des équipements aquacoles en Europe vs Afrique ?'},
  {ico:'🎯',ttl:'Meta Ads',sub:'Électronique MALLOVEX',tx:'Rédige 3 accroches Meta Ads haute-conversion pour produits électroniques MALLOVEX.'}
];
let mIdx=0,hist=[],busy=false;
let apiKey=localStorage.getItem('mx_key')||'';
function esc(s){return s.replace(/'/g,"\\'");}
function build(){
  document.getElementById('modebar').innerHTML=MODES.map((m,i)=>`<div class="mpill ${i?'':'active'}" data-i="${i}" onclick="selMode(${i})"><span class="mpill-ico">${m.ico}</span><span class="mpill-lbl">${m.lbl}</span></div>`).join('');
  document.getElementById('sitems').innerHTML=MODES.map((m,i)=>`<div class="sitem ${i?'':'active'}" onclick="selMode(${i});closeSheet()"><div class="sico">${m.ico}</div><div class="stxt"><div class="sname">${m.ttl}</div><div class="sdesc">${m.sub}</div></div><div class="schk">✓</div></div>`).join('');
  document.getElementById('sugg').innerHTML=SUGG.map(s=>`<div class="scard" onclick="qs('${esc(s.tx)}')"><div class="scard-ico">${s.ico}</div><div class="scard-ttl">${s.ttl}</div><div class="scard-sub">${s.sub}</div></div>`).join('');
  buildQbar();
  if(window.navigator.standalone||window.matchMedia('(display-mode:standalone)').matches){const b=document.getElementById('instBanner');if(b)b.remove();}
  if(!apiKey)askKey();
  window.addEventListener('resize',()=>{const c=document.getElementById('chat');c.scrollTop=c.scrollHeight;});
}
function buildQbar(){document.getElementById('qbar').innerHTML=MODES[mIdx].prompts.map(p=>`<div class="qp" onclick="qs('${esc(p)}')">💬 ${p}</div>`).join('');}
function selMode(i){mIdx=i;document.querySelectorAll('.mpill').forEach((el,j)=>el.classList.toggle('active',j===i));document.querySelectorAll('.sitem').forEach((el,j)=>el.classList.toggle('active',j===i));buildQbar();const pill=document.querySelector(`.mpill[data-i="${i}"]`);if(pill)pill.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
function openSheet(){const ov=document.getElementById('ov');ov.style.display='flex';requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('open')));}
function closeSheet(e){if(e&&e.target!==document.getElementById('ov'))return;const ov=document.getElementById('ov');ov.classList.remove('open');setTimeout(()=>ov.style.display='none',330);}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,108)+'px';}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey&&!('ontouchstart' in window)){e.preventDefault();send();}}
function hideWelcome(){const w=document.getElementById('welcome');if(w)w.style.display='none';document.getElementById('qbar').classList.remove('hidden');}
function addMsg(role,html,acts=false){
  hideWelcome();
  const c=document.getElementById('chat');
  const d=document.createElement('div');d.className=`msg ${role}`;
  const av=document.createElement('div');av.className=`av ${role==='user'?'you':'ai'}`;av.textContent=role==='user'?'YOU':'MX';
  const b=document.createElement('div');b.className=`bub ${role==='user'?'user':'ai'}`;b.innerHTML=html;
  if(acts&&role==='assistant'){const a=document.createElement('div');a.className='bub-acts';a.innerHTML='<div class="bact" onclick="doCopy(this)">📋 Copier</div><div class="bact" onclick="doShare(this)">📤 Partager</div>';b.appendChild(a);}
  d.appendChild(av);d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight;return b;
}
function addTyping(){hideWelcome();const c=document.getElementById('chat');const d=document.createElement('div');d.className='msg';d.id='typ';d.innerHTML='<div class="av ai">MX</div><div class="bub ai"><div class="typing"><span></span><span></span><span></span></div></div>';c.appendChild(d);c.scrollTop=c.scrollHeight;}
function rmTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function fmt(t){
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/^#{1,3}\s+(.+)$/gm,'<h4>$1</h4>');
  t=t.replace(/`([^`]+)`/g,'<strong>$1</strong>');
  const lines=t.split('\n');let h='',inL=false;
  for(let ln of lines){ln=ln.trim();if(!ln){if(inL){h+='</ul>';inL=false;}h+='<br>';continue;}if(/^[-•*]\s/.test(ln)){if(!inL){h+='<ul>';inL=true;}h+=`<li>${ln.replace(/^[-•*]\s/,'')}</li>`;}else if(/^\d+\.\s/.test(ln)){if(!inL){h+='<ul>';inL=true;}h+=`<li>${ln.replace(/^\d+\.\s/,'')}</li>`;}else{if(inL){h+='</ul>';inL=false;}h+=ln.startsWith('<h4>')?ln:`<p>${ln}</p>`;}}
  if(inL)h+='</ul>';return h;
}
async function send(){
  if(busy)return;
  if(!apiKey){askKey();return;}
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';inp.blur();
  busy=true;document.getElementById('sbtn').disabled=true;
  addMsg('user',txt);hist.push({role:'user',content:txt});addTyping();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:MODES[mIdx].sys,messages:hist})});
    const d=await r.json();rmTyping();
    if(d.content?.[0]?.text){const rep=d.content[0].text;hist.push({role:'assistant',content:rep});addMsg('assistant',fmt(rep),true);}
    else if(d.error?.type==='authentication_error'){apiKey='';localStorage.removeItem('mx_key');addMsg('assistant','<strong>🔑 Clé API invalide.</strong><br>Tapez /key pour en saisir une nouvelle.');}
    else{addMsg('assistant',`<strong>Erreur:</strong> ${d.error?.message||'Réponse inattendue.'}`);}
  }catch(e){rmTyping();addMsg('assistant','<strong>⚠️ Erreur réseau.</strong><br>Vérifiez votre connexion et réessayez.');}
  busy=false;document.getElementById('sbtn').disabled=false;
  const c=document.getElementById('chat');c.scrollTop=c.scrollHeight;
}
function qs(tx){document.getElementById('inp').value=tx;send();}
function getBubText(btn){return btn.closest('.bub').innerText.replace(/📋 Copier\s*📤 Partager/,'').trim();}
function doCopy(btn){const txt=getBubText(btn);if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('✅ Copié !')).catch(()=>fallbackCopy(txt));}else fallbackCopy(txt);}
function fallbackCopy(txt){const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ Copié !');}
function doShare(btn){if(navigator.share){navigator.share({title:'MALLOVEX Sales AI',text:getBubText(btn)}).catch(()=>{});}else doCopy(btn);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function askKey(){const k=prompt('🔑 Clé API Anthropic\n(commence par sk-ant-)');if(k?.startsWith('sk-ant-')){apiKey=k;localStorage.setItem('mx_key',k);toast('✅ Clé enregistrée');}else if(k)toast('❌ Clé invalide');}
document.getElementById('inp').addEventListener('input',function(){if(this.value.trim()==='/key'){this.value='';askKey();}});
build();
</script>
</body>
